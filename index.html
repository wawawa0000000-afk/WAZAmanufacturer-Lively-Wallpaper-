<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>和座製作所 - Wallpaper</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; 
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        .kanji {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 35vmin; 
            font-family: "Yu Mincho", "MS Mincho", serif;
            z-index: 10;
            pointer-events: none;
            user-select: none;
            line-height: 1; 
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>
    <div class="kanji">座</div>
    
    <!-- ここに囲まれたら無効化されます -->

</html>
